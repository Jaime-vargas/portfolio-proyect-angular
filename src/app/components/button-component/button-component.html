<button class="buttonComponent"
        [ngClass]="{
          'filledButton': variant() === 'filled',
          'outlineButton': variant() === 'outline',
          'textButton': variant() === 'text'
        }">
  <ng-content select="[body]"></ng-content>
  @if (variant() === 'text') {
    <nz-icon nzType="arrow-right" nzTheme="outline"  />
  }
</button>
